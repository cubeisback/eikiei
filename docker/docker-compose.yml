services:
    postgres:
        image: postgres:15
        container_name: eikiei_postgres
        restart: always
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: admin
            POSTGRES_DB: crm
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:7
        container_name: eikiei_redis
        ports:
            - "6379:6379"

volumes:
    postgres_data:
