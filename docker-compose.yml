services:
    postgres:
        image: postgres:17-alpine
        container_name: eikiei_postgres
        environment:
            POSTGRES_USER: crm_user
            POSTGRES_PASSWORD: crm_password
            POSTGRES_DB: crm_db
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:8-alpine
        container_name: eikiei_redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    api:
        build:
            context: .
            dockerfile: apps/api/Dockerfile
        container_name: eikiei_api
        ports:
            - "3001:3001"
        environment:
            NODE_ENV: development
            DATABASE_URL: postgresql://crm_user:crm_password@postgres:5432/crm_db
            REDIS_URL: redis://redis:6379
        volumes:
            - ./apps/api:/app/apps/api
            - /app/apps/api/node_modules
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy

    web:
        build:
            context: .
            dockerfile: apps/web/Dockerfile
        container_name: eikiei_web
        ports:
            - "3000:3000"
        environment:
            NODE_ENV: development
            NEXT_PUBLIC_API_URL: http://localhost:3001
        volumes:
            - ./apps/web:/app/apps/web
            - /app/apps/web/node_modules
        depends_on:
            - api

volumes:
    postgres_data:
    redis_data:
